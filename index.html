<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/calculator-icon.svg">
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <h1>
                <img src="assets/icons/calculator-icon.svg" alt="Calculator" class="title-icon">
                Calculator
            </h1>
            
            <div class="calculator">
                <input type="text" id="display" readonly placeholder="0">
                
                <div class="buttons">
                    <button class="btn number" data-value="7">7</button>
                    <button class="btn number" data-value="8">8</button>
                    <button class="btn number" data-value="9">9</button>
                    <button class="btn operator" data-operator="/">÷</button>
                    
                    <button class="btn number" data-value="4">4</button>
                    <button class="btn number" data-value="5">5</button>
                    <button class="btn number" data-value="6">6</button>
                    <button class="btn operator" data-operator="*">×</button>
                    
                    <button class="btn number" data-value="1">1</button>
                    <button class="btn number" data-value="2">2</button>
                    <button class="btn number" data-value="3">3</button>
                    <button class="btn operator" data-operator="-">-</button>
                    
                    <button class="btn number" data-value="0">0</button>
                    <button class="btn number" data-value="00">00</button>
                    <button class="btn number" data-value=".">.</button>
                    <button class="btn operator" data-operator="+">+</button>
                    
                    <button class="btn clear">C</button>
                    <button class="btn equals">=</button>
                </div>
            </div>
            
            <div class="history-section">
                <div class="history-header">
                    <h3>
                        <img src="assets/icons/history-icon.svg" alt="History" class="history-icon">
                        Calculation History
                    </h3>
                    <button id="clearHistoryBtn" class="clear-history-btn">Clear All</button>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
